<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;}
.hero{background:#1e293b;color:#fff;padding:32px 40px;}

.chart-box h3{color:#475569;margin-bottom:12px;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
th{background:#f8fafc;padding:12px 16px;text-align:left;border-bottom:2px solid #e2e8f0;font-size:0.85rem;color:#475569;}
td{padding:12px 16px;border-bottom:1px solid #f1f5f9;font-size:0.9rem;}
